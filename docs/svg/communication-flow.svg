<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <marker id="arr-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d4ff"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ff88"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4444"/>
    </marker>
    <marker id="arr-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff44ff"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667788"/>
    </marker>
  </defs>

  <rect width="900" height="700" fill="url(#bg-grad)" rx="8"/>
  <text x="450" y="30" text-anchor="middle" fill="#fcee09" font-size="16" font-weight="bold">Communication Flow — Command Execution</text>

  <!-- Lifeline headers -->
  <rect x="40" y="50" width="120" height="35" fill="none" stroke="#00d4ff" stroke-width="1.5" rx="4"/>
  <text x="100" y="72" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="bold">Claude LLM</text>

  <rect x="230" y="50" width="120" height="35" fill="none" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="290" y="72" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">MCP Server</text>

  <rect x="430" y="50" width="120" height="35" fill="none" stroke="#ff4444" stroke-width="1.5" rx="4"/>
  <text x="490" y="72" text-anchor="middle" fill="#ff4444" font-size="11" font-weight="bold">RedSocket</text>

  <rect x="620" y="50" width="120" height="35" fill="none" stroke="#ff44ff" stroke-width="1.5" rx="4"/>
  <text x="680" y="72" text-anchor="middle" fill="#ff44ff" font-size="11" font-weight="bold">CET Bridge</text>

  <rect x="790" y="50" width="90" height="35" fill="none" stroke="#ff6644" stroke-width="1.5" rx="4"/>
  <text x="835" y="72" text-anchor="middle" fill="#ff6644" font-size="11" font-weight="bold">Game</text>

  <!-- Lifelines -->
  <line x1="100" y1="85" x2="100" y2="680" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="290" y1="85" x2="290" y2="680" stroke="#00ff88" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="490" y1="85" x2="490" y2="680" stroke="#ff4444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="680" y1="85" x2="680" y2="680" stroke="#ff44ff" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="835" y1="85" x2="835" y2="680" stroke="#ff6644" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: Tool Call -->
  <text x="20" y="125" fill="#fcee09" font-size="10" font-weight="bold">1</text>
  <line x1="100" y1="120" x2="280" y2="120" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
  <text x="190" y="115" text-anchor="middle" fill="#00d4ff" font-size="9">tools/call: execute_lua</text>
  <text x="190" y="135" text-anchor="middle" fill="#667788" font-size="8">{code: "Game.GetPlayer():GetLevel()"}</text>

  <!-- Step 2: JSON-RPC -->
  <text x="20" y="175" fill="#fcee09" font-size="10" font-weight="bold">2</text>
  <line x1="290" y1="170" x2="480" y2="170" stroke="#00ff88" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="385" y="165" text-anchor="middle" fill="#00ff88" font-size="9">TCP send command</text>
  <text x="385" y="185" text-anchor="middle" fill="#667788" font-size="8">{"id":"abc","type":"exec","code":"..."}</text>

  <!-- Step 3: RedSocket delivers -->
  <text x="20" y="225" fill="#fcee09" font-size="10" font-weight="bold">3</text>
  <line x1="490" y1="220" x2="670" y2="220" stroke="#ff4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="580" y="215" text-anchor="middle" fill="#ff4444" font-size="9">OnCommand callback</text>
  <text x="580" y="235" text-anchor="middle" fill="#667788" font-size="8">Lua string received</text>

  <!-- Step 4: Execute in Lua VM -->
  <text x="20" y="275" fill="#fcee09" font-size="10" font-weight="bold">4</text>
  <line x1="680" y1="270" x2="825" y2="270" stroke="#ff44ff" stroke-width="1.5" marker-end="url(#arr-pink)"/>
  <text x="752" y="265" text-anchor="middle" fill="#ff44ff" font-size="9">loadstring(code)()</text>
  <text x="752" y="285" text-anchor="middle" fill="#667788" font-size="8">Execute via RTTI</text>

  <!-- Step 5: Game returns result -->
  <text x="20" y="325" fill="#fcee09" font-size="10" font-weight="bold">5</text>
  <line x1="825" y1="320" x2="690" y2="320" stroke="#ff6644" stroke-width="1.5" marker-end="url(#arr-pink)"/>
  <text x="752" y="315" text-anchor="middle" fill="#ff6644" font-size="9">return value</text>
  <text x="752" y="335" text-anchor="middle" fill="#667788" font-size="8">e.g. 50 (player level)</text>

  <!-- Step 6: Serialize + send back -->
  <text x="20" y="375" fill="#fcee09" font-size="10" font-weight="bold">6</text>
  <line x1="670" y1="370" x2="500" y2="370" stroke="#ff44ff" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="580" y="365" text-anchor="middle" fill="#ff44ff" font-size="9">SendCommand(result_json)</text>
  <text x="580" y="385" text-anchor="middle" fill="#667788" font-size="8">{"id":"abc","result":"50"}</text>

  <!-- Step 7: TCP response -->
  <text x="20" y="425" fill="#fcee09" font-size="10" font-weight="bold">7</text>
  <line x1="480" y1="420" x2="300" y2="420" stroke="#ff4444" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="385" y="415" text-anchor="middle" fill="#ff4444" font-size="9">TCP response</text>
  <text x="385" y="435" text-anchor="middle" fill="#667788" font-size="8">MCP server receives</text>

  <!-- Step 8: Tool result -->
  <text x="20" y="475" fill="#fcee09" font-size="10" font-weight="bold">8</text>
  <line x1="280" y1="470" x2="110" y2="470" stroke="#00ff88" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
  <text x="190" y="465" text-anchor="middle" fill="#00ff88" font-size="9">Tool result (content[])</text>
  <text x="190" y="485" text-anchor="middle" fill="#667788" font-size="8">[{type:"text", text:"Player level: 50"}]</text>

  <!-- Separator -->
  <line x1="30" y1="510" x2="880" y2="510" stroke="#667788" stroke-width="0.5" stroke-dasharray="2,4"/>
  <text x="450" y="530" text-anchor="middle" fill="#fcee09" font-size="11" font-weight="bold">File-Based Fallback (No RedSocket)</text>

  <!-- File fallback flow -->
  <text x="20" y="560" fill="#fcee09" font-size="10" font-weight="bold">A</text>
  <line x1="290" y1="555" x2="670" y2="555" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-pink)"/>
  <text x="480" y="550" text-anchor="middle" fill="#00ff88" font-size="9">Write command.json to mod directory</text>

  <text x="20" y="595" fill="#fcee09" font-size="10" font-weight="bold">B</text>
  <rect x="640" y="575" width="80" height="25" fill="none" stroke="#ff44ff" stroke-width="1" rx="3"/>
  <text x="680" y="592" text-anchor="middle" fill="#ff44ff" font-size="9">onUpdate</text>
  <text x="680" y="610" text-anchor="middle" fill="#667788" font-size="8">polls file</text>

  <text x="20" y="645" fill="#fcee09" font-size="10" font-weight="bold">C</text>
  <line x1="670" y1="640" x2="300" y2="640" stroke="#ff44ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>
  <text x="480" y="635" text-anchor="middle" fill="#ff44ff" font-size="9">Write result.json to mod directory</text>

  <text x="20" y="670" fill="#fcee09" font-size="10" font-weight="bold">D</text>
  <line x1="280" y1="665" x2="110" y2="665" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-cyan)"/>
  <text x="190" y="660" text-anchor="middle" fill="#00ff88" font-size="9">Read result → Tool response</text>
</svg>